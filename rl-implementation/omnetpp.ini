# Scenario S5-A: Data Packet Size = 500 bits
[S5-A]
extends = General
*.node[*].dataPacketSize = 500bit

# Scenario S5-B: Data Packet Size = 4000 bits
[S5-B]
extends = General
*.node[*].dataPacketSize = 4000bit
[General]
network = UavWsnNetwork
# Random Waypoint UAV mobility: run until LND (Last Node Death)
# Extended to capture complete network lifetime with 774s rounds
# Extended to: 1,161,000s (322.5 hours, ~1500 rounds)
sim-time-limit = 300000s

# Network Topology - 100-node benchmark
*.numNodes = 100
*.areaX = 500m
*.areaY = 500m

# Sensor Node Energy Model (First-Order Radio Model) - S_Ideal specification
*.node[*].initialEnergy = 0.5J  # Standard LEACH paper energy (from metrics.txt)
*.node[*].chProbability = 0.1  # Target ~10 CHs for faster collection

*.node[*].controlPacketSize = 200bit  # S_Ideal specification (from metrics.txt)
*.node[*].dataPacketSize = 2000bit  # 2 kbit per packet (from metrics.txt)
*.node[*].eElec = 50e-9J  # 50 nJ/bit - electronic energy (from metrics.txt)
*.node[*].eFreeSpace = 10e-12J  # 10 pJ/bit/m^2 - free space model (from metrics.txt)
*.node[*].eMultiPath = 0.0013e-12J  # 0.0013 pJ/bit/m^4 - multipath model (from metrics.txt)
*.node[*].idleListeningPower = 1.84e-5W  # Tuned for FND=800-1500 rounds (18.4 µW)
*.node[*].chDutyCycle = 0.3  # CH duty cycle: 30% active (30s per 100s round)
*.node[*].memberDutyCycle = 0.02  # Member duty cycle: 2% active (2s per 100s round - TDMA slot)
*.node[*].isolatedDutyCycle = 0.001  # Isolated duty cycle: 0.1% (0.1s per 100s round - sleep until CH ADV)
*.node[*].commRadius = 100m  # Sensor transmission range (from metrics.txt)

# Clustering Protocol Timing Parameters (GLOBAL SYNC for 100s rounds)
# Phase 1: Clustering (0-8s) - All CHs must complete aggregation by t=8s
*.node[*].neighborDiscoveryDelay = 0.2s  # CH ADV broadcast at t=0.2s
*.node[*].clusteringPhaseDelay = 2.0s    # TDMA schedule created by t=2.0s
*.node[*].joinAttemptDelay = 0.8s        # Members check membership at t=0.8s
*.node[*].unclusteredTimeout = 3.0s      # Unclustered nodes wait until t=3s then passive listen
*.node[*].roundDuration = 200.0s         # GLOBAL SYNC: 200s rounds
*.node[*].maxBufferSize = 200000bit      # Increased buffer for adaptive expiration (5 UAV visits)

# Base Station Location (outside network at (-100, 250)) - FIXED PARAMETER
*.bs.commRadius = 200m  # Base station communication range
*.bs.xPos = -100m       # CONSISTENT: BS at (-100, 250)
*.bs.yPos = 250m

# UAV Parameters - GLOBAL SYNC with 100s rounds
*.uav.uavHeight = 30m           # 30m altitude
*.uav.minSpeed = 10mps          # CONSISTENT: 10 m/s (no variation)
*.uav.maxSpeed = 10mps          # CONSISTENT: 10 m/s
*.uav.searchSpeed = 10mps       # CONSISTENT: 10 m/s
*.uav.discoveryInterval = 5.0s  # Beacon every 5s (reduced from 1s for performance)
*.uav.commRadius = 192m         # 192m nominal radius (190m effective at 30m height)
*.uav.dataRate = 2000000bps     # 2 Mbps data rate
*.uav.handshakeDelay = 0.05s    # 50ms handshake delay
*.uav.roundDuration = 200s      # GLOBAL SYNC: 200s rounds
*.uav.collectionWindow = 130s   # Collection: 130s (35-165s window)

# Round Timing - 200s rounds (SYNCHRONIZED)
# Total: Clustering(8s,parallel) + UAVEntry(35s) + Collection(130s) + Return(35s) + Buffer(1s) = 200s

# Simulation Recording (keep metrics; reduce console overhead)
**.scalar-recording = true
**.vector-recording = true
cmdenv-event-banners = false
**.cmdenv-log-level = debug